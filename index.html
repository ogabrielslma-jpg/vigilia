<style>
:root {
  --bg: #0a0d0a;
  --bg-elevated: rgba(20, 23, 20, 0.6);
  --bg-modal: rgba(10, 13, 10, 0.95);
  --border: #262b26;
  --border-strong: #3a3f3a;
  --text: #e8ebe5;
  --muted: #7a807a;
  --dim: #4a504a;
  --accent: #e8b84c;
  --danger: #d4614a;
  --success: #7fa870;
  --detect: #6ec2e8;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-sans);
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, select { font-family: inherit; color: inherit; background: none; border: none; outline: none; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.mode-select { min-height: 100dvh; display: flex; flex-direction: column; padding: 3rem 1.5rem; max-width: 40rem; margin: 0 auto; }
.brand { font-family: var(--font-mono); font-weight: 700; font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: -0.02em; line-height: 1; }
.brand-sub { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.75rem; }
.mode-options { display: flex; flex-direction: column; gap: 0.75rem; margin-top: auto; padding-top: 4rem; }
.mode-card { padding: 1.75rem 1.5rem; border: 1px solid var(--border); background: var(--bg-elevated); text-align: left; transition: border-color 0.2s, background 0.2s; display: flex; align-items: center; gap: 1.5rem; }
.mode-card:hover, .mode-card:focus-visible { border-color: var(--accent); background: rgba(232,184,76,0.04); }
.mode-card:focus-visible { outline: none; }
.mode-card:hover .mode-marker, .mode-card:focus-visible .mode-marker { color: var(--accent); }
.mode-marker { font-family: var(--font-mono); color: var(--dim); font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
.mode-content { flex: 1; }
.mode-title { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
.mode-desc { color: var(--muted); font-size: 0.85rem; margin-top: 0.35rem; line-height: 1.5; }
.mode-footer { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.7rem; font-family: var(--font-mono); letter-spacing: 0.05em; line-height: 1.6; }

.topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); gap: 1rem; flex-wrap: wrap; }
.topbar-brand { font-family: var(--font-mono); font-weight: 700; font-size: 0.8rem; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.75rem; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: background 0.2s; }
.status-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
.topbar-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.btn { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.55rem 0.85rem; border: 1px solid var(--border); color: var(--text); background: transparent; transition: all 0.15s; font-weight: 500; white-space: nowrap; }
.btn:hover:not(:disabled) { border-color: var(--border-strong); background: rgba(255,255,255,0.02); }
.btn-primary { border-color: var(--accent); color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover:not(:disabled) { background: var(--danger); color: var(--bg); }
.btn-toggle-on { border-color: var(--detect); color: var(--detect); background: rgba(110,194,232,0.08); }
.btn-toggle-on:hover:not(:disabled) { background: var(--detect); color: var(--bg); }
.btn-badge { display: inline-block; margin-left: 0.35rem; padding: 0 0.35rem; background: var(--danger); color: var(--bg); font-weight: 700; border-radius: 2px; min-width: 1.2rem; text-align: center; }

.camera-screen { display: flex; flex-direction: column; min-height: 100dvh; }
.camera-body { flex: 1; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; max-width: 42rem; margin: 0 auto; width: 100%; }
.id-block { border: 1px solid var(--border); padding: 1.25rem 1.5rem; background: var(--bg-elevated); }
.id-label { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }
.id-value { font-family: var(--font-mono); font-weight: 700; font-size: 1.75rem; letter-spacing: 0.06em; color: var(--accent); margin-top: 0.35rem; user-select: all; }
.id-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
.video-frame { position: relative; aspect-ratio: 4/3; background: #000; border: 1px solid var(--border); overflow: hidden; }
.video-frame video { width: 100%; height: 100%; object-fit: cover; display: block; }
.video-overlay { position: absolute; inset: 0; pointer-events: none; padding: 0.75rem 1rem; display: flex; align-items: flex-end; justify-content: space-between; background: linear-gradient(to top, rgba(0,0,0,0.65), transparent 45%); font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.06em; }
.live-indicator { display: flex; align-items: center; gap: 0.5rem; color: var(--accent); }
.live-indicator::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; }
.controls-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.status-line { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); letter-spacing: 0.03em; padding-top: 0.75rem; border-top: 1px solid var(--border); line-height: 1.5; }
.status-line.error { color: var(--danger); } .status-line.ok { color: var(--success); }

.panel-screen { display: flex; flex-direction: column; min-height: 100dvh; }
.panel-body { flex: 1; padding: 1.25rem; }

.settings-bar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; padding: 0.85rem 1rem; border: 1px solid var(--border); background: var(--bg-elevated); margin-bottom: 1rem; font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.05em; }
.settings-bar > label { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); }
.settings-bar select { padding: 0.35rem 0.5rem; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 0.75rem; }
.settings-bar select:focus { border-color: var(--accent); }
.mode-badge { color: var(--accent); border: 1px solid var(--accent); padding: 0.15rem 0.5rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.65rem; }

.add-camera { display: flex; gap: 0.5rem; padding: 0.75rem; border: 1px dashed var(--border); background: var(--bg-elevated); margin-bottom: 1.25rem; max-width: 32rem; }
.add-camera input { flex: 1; padding: 0.6rem 0.75rem; border: 1px solid var(--border); font-family: var(--font-mono); letter-spacing: 0.05em; background: var(--bg); font-size: 0.85rem; }
.add-camera input:focus { border-color: var(--accent); }
.add-camera input::placeholder { color: var(--dim); }

.detect-status { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 1rem; padding-left: 0.5rem; border-left: 2px solid var(--border); }
.detect-status.loading, .detect-status.ready { color: var(--detect); border-left-color: var(--detect); }
.detect-status.error { color: var(--danger); border-left-color: var(--danger); }
.detect-status.off { display: none; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 22rem), 1fr)); gap: 0.75rem; }
.tile { border: 1px solid var(--border); background: #000; aspect-ratio: 4/3; position: relative; overflow: hidden; }
.tile video { width: 100%; height: 100%; object-fit: cover; display: block; }
.tile canvas.detect-overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 1; }
.tile canvas.debug-overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 1; opacity: 0.55; mix-blend-mode: screen; display: none; }
.tile canvas.debug-overlay.on { display: block; }
.tile.alerting { animation: alert-flash 0.5s ease-out; }
@keyframes alert-flash { 0%, 100% { box-shadow: inset 0 0 0 3px transparent; } 50% { box-shadow: inset 0 0 0 3px var(--danger); } }
.tile-empty-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.05em; background: #000; text-align: center; padding: 1rem; z-index: 3; }
.tile-header { position: absolute; top: 0; left: 0; right: 0; padding: 0.55rem 0.75rem; background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.05em; z-index: 2; gap: 0.5rem; }
.tile-id { color: var(--text); font-weight: 500; }
.tile-detect-badge { color: var(--detect); font-size: 0.65rem; font-weight: 500; display: none; }
.tile-detect-badge.active { display: inline; }
.tile-detect-badge.alert { color: var(--danger); }
.tile-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 0.55rem 0.75rem; background: linear-gradient(to top, rgba(0,0,0,0.75), transparent); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.05em; z-index: 2; }
.tile-live { display: none; align-items: center; gap: 0.4rem; color: var(--accent); }
.tile-live.active { display: inline-flex; }
.tile-live::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: pulse 2s ease-in-out infinite; }
.tile-time { color: var(--text); }
.tile-remove { color: var(--muted); font-family: var(--font-mono); font-size: 0.85rem; padding: 0.15rem 0.4rem; transition: color 0.15s; pointer-events: auto; }
.tile-remove:hover { color: var(--danger); }
.tile-debug-info { position: absolute; top: 3rem; left: 0.75rem; z-index: 2; font-family: var(--font-mono); font-size: 0.65rem; color: var(--detect); background: rgba(0,0,0,0.6); padding: 0.35rem 0.5rem; border: 1px solid var(--detect); line-height: 1.5; display: none; letter-spacing: 0.02em; }
.tile-debug-info.on { display: block; }

.grid-empty { padding: 4rem 2rem; border: 1px dashed var(--border); text-align: center; color: var(--muted); font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 0.05em; line-height: 1.8; }
.grid-empty .empty-hint { display: block; color: var(--dim); margin-top: 1rem; font-size: 0.75rem; letter-spacing: 0.02em; line-height: 1.7; }

.modal-backdrop { position: fixed; inset: 0; background: var(--bg-modal); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
.modal { width: 100%; max-width: 46rem; border: 1px solid var(--border-strong); background: var(--bg); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 0.08em; font-weight: 700; }
.modal-header-actions { display: flex; gap: 0.5rem; }
.modal-body { max-height: 70vh; overflow-y: auto; }
.log-filters { display: flex; gap: 0.4rem; padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.log-filter-chip { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.4rem 0.75rem; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.15s; cursor: pointer; }
.log-filter-chip:hover { border-color: var(--border-strong); color: var(--text); }
.log-filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(232,184,76,0.08); }
.log-filter-count { opacity: 0.55; margin-left: 0.35rem; font-weight: 400; }
.log-empty { padding: 3rem 1.5rem; text-align: center; color: var(--muted); font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.05em; }
.log-item { display: grid; grid-template-columns: auto 1fr auto; gap: 1rem; align-items: center; padding: 0.85rem 1.5rem; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.8rem; transition: background 0.15s; }
.log-item:hover { background: rgba(255,255,255,0.02); }
.log-time { color: var(--muted); font-weight: 500; }
.log-detail { color: var(--text); }
.log-detail .log-class { color: var(--danger); font-weight: 600; }
.log-detail .log-cam { color: var(--accent); }
.log-detail .log-score { color: var(--muted); font-size: 0.75rem; }
.log-thumb { width: 60px; height: 45px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
.log-thumb:hover { border-color: var(--accent); }
.log-thumb.placeholder { background: var(--border); display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 0.6rem; letter-spacing: 0.05em; }
.snapshot-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 2rem; cursor: zoom-out; }
.snapshot-viewer img { max-width: 100%; max-height: 100%; border: 1px solid var(--border-strong); }
.video-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.video-viewer video { max-width: 100%; max-height: 100%; border: 1px solid var(--border-strong); background: #000; }
.video-close { position: absolute; top: 1rem; right: 1rem; width: 2.5rem; height: 2.5rem; border: 1px solid var(--border-strong); background: rgba(0,0,0,0.6); color: var(--text); font-family: var(--font-mono); font-size: 1rem; cursor: pointer; }
.video-close:hover { border-color: var(--accent); color: var(--accent); }
.log-video-btn { display: inline-block; margin-left: 0.5rem; padding: 0.25rem 0.5rem; font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.05em; border: 1px solid var(--detect); color: var(--detect); background: transparent; cursor: pointer; transition: all 0.15s; }
.log-video-btn:hover { background: var(--detect); color: var(--bg); }
.log-video-status { display: inline-block; margin-left: 0.5rem; padding: 0.25rem 0.5rem; font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.05em; color: var(--dim); }
.log-ai { display: block; margin-top: 0.4rem; padding: 0.35rem 0.55rem; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.02em; line-height: 1.45; border-left: 2px solid var(--detect); color: var(--detect); background: rgba(110,194,232,0.06); }
.log-ai.risco { border-left-color: var(--danger); color: var(--danger); background: rgba(212,97,74,0.08); }
.log-ai.atencao { border-left-color: var(--accent); color: var(--accent); background: rgba(232,184,76,0.08); }
.log-ai.ok { border-left-color: var(--success); color: var(--success); background: rgba(127,168,112,0.06); }
.log-ai.pending { border-left-color: var(--dim); color: var(--muted); background: transparent; font-style: italic; }
.log-ai em { font-style: normal; opacity: 0.7; }

@media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>

<script>
// ============================================================
// VIGÍLIA v4 — detector de queda reescrito (centroide global)
// ============================================================

// Gemini (analise por IA) - chave fica no servidor Vercel via /api/gemini

const GEMINI_PERIODIC_INTERVAL_MS = 10 * 60 * 1000;
const GEMINI_SNAPSHOT_W = 640;
const GEMINI_SNAPSHOT_H = 480;

// Supabase (gravacoes de clip)
const SUPABASE_URL = 'https://fjrtnksndmwncmssonum.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqcnRua3NuZG13bmNtc3NvbnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTg5MzgsImV4cCI6MjA5OTY5NDkzOH0.NV43J8Ykt0mtpJVbI7mCo5INe01G6ou13sLw2acTpps';
const CLIP_PRE_MS = 3000;
const CLIP_POST_MS = 1500;
const CLIP_BITRATE = 500000;
const CLIP_MAX_AGE_MS = 10 * 60 * 1000;
const CLEANUP_INTERVAL_MS = 60000;

const app = document.getElementById('app');

const state = {
  mode: null, peer: null, myId: null,
  localStream: null, currentFacing: 'environment',
  activeCalls: new Set(), cameras: new Map(),
  clockInt: null,
};

const detection = {
  detector: null, loading: false,
  enabled: false, alertsEnabled: true,
  debugMode: false,
  audioCtx: null,
  cooldowns: new Map(),
  events: [],
  workMode: 'residential',
  sensitivity: 'medium',
  targetClasses: new Set(['person', 'cat', 'dog']),
  alertClasses: new Set(['person']),
  logFilter: 'all',
};

const LOG_FILTER_MATCH = {
  all:    () => true,
  fall:   (ev) => ev.class === 'fall',
  person: (ev) => ev.class === 'person',
  pet:    (ev) => ev.class === 'cat' || ev.class === 'dog',
  ai:     (ev) => ev.class === 'ai-review',
};

const CLASS_MIN_SCORE = {
  person: 0.55, cat: 0.35, dog: 0.40,
  bird: 0.4, backpack: 0.4, handbag: 0.4,
  suitcase: 0.4, car: 0.5, motorcycle: 0.5, bicycle: 0.5,
};

const CLASS_LABELS_PT = {
  person: 'pessoa', cat: 'gato', dog: 'cachorro', car: 'carro',
  motorcycle: 'moto', bicycle: 'bicicleta', bird: 'pássaro',
  backpack: 'mochila', handbag: 'bolsa', suitcase: 'mala',
  'cell phone': 'celular', laptop: 'notebook',
};

// Parâmetros de detecção de queda por perfil de sensibilidade
// motionThreshold: diferença de brilho em pixel para contar como "movimento"
// minPixels: total de pixels em movimento pra considerar que há atividade
// minDropRatio: quanto o centro do movimento precisa cair (fração do frame)
// minFrames: quantos frames consecutivos com queda são exigidos
// cooldownMs: intervalo mínimo entre alertas da mesma câmera
const SENS_PROFILES = {
  low:    { motionThreshold: 32, minPixels: 150, minDropRatio: 0.15, minFrames: 3, cooldownMs: 5000 },
  medium: { motionThreshold: 22, minPixels: 80,  minDropRatio: 0.10, minFrames: 3, cooldownMs: 3000 },
  high:   { motionThreshold: 15, minPixels: 40,  minDropRatio: 0.07, minFrames: 2, cooldownMs: 2000 },
};

function friendlyId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = ''; for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return 'vg-' + s;
}
function storage(key, val) {
  try {
    if (val === undefined) return JSON.parse(localStorage.getItem(key) || 'null');
    localStorage.setItem(key, JSON.stringify(val));
  } catch {}
}
function fmtTime(d = new Date()) { return d.toLocaleTimeString('pt-BR', { hour12: false }); }
function fmtDateTime(d = new Date()) { return d.toLocaleString('pt-BR', { hour12: false }); }
function createEmptyStream() {
  const c = document.createElement('canvas'); c.width = 2; c.height = 2;
  c.getContext('2d').fillRect(0, 0, 2, 2); return c.captureStream(1);
}

          </div>

          <div class="mode-marker">02</div>

            <div class="mode-title">Ver painel</div>

  app.querySelectorAll('.mode-card').forEach(el => {

async function startLocalCamera() {

  try {
    await startLocalCamera();
    const nt = state.localStream.getVideoTracks()[0];
    state.activeCalls.forEach(call => {
      const s = call.peerConnection?.getSenders().find(s => s.track && s.track.kind === 'video');
      if (s && nt) s.replaceTrack(nt);

    setCamStatus('Câmera virada.', 'ok');
  } catch (err) { setCamStatus('Erro: ' + err.message, 'error'); }

function connectAsCamera(id) {
  try { state.peer && state.peer.destroy(); } catch {}
  state.peer = new Peer(id);
  state.peer.on('open', (openedId) => {
    state.myId = openedId; storage('vigilia:my-id', openedId);

    setCamStatus(`Painel conectado (${state.activeCalls.size}).`, 'ok');
    call.on('close', () => {
      state.activeCalls.delete(call);
      setCamStatus(state.activeCalls.size === 0 ? 'Aguardando painel…' : `${state.activeCalls.size} viewer(s).`, state.activeCalls.size ? 'ok' : '');
    });
    call.on('error', (e) => console.warn(e));

  state.peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {

async function runPeriodicAiAnalysis() {
  if (!detection.enabled) return;
  for (const [peerId, tile] of state.cameras) {
    if (!tile.gotStream) continue;
    try {
      const hiRes = captureThumbnail(tile.video, GEMINI_SNAPSHOT_W, GEMINI_SNAPSHOT_H);
      if (!hiRes) continue;
      const text = await analyzeWithGemini(hiRes, GEMINI_PROMPT_PERIODIC);
      const parsed = text ? (parseGeminiJson(text) || { raw: text }) : { error: true, description: 'Análise indisponível' };
      const status = parsed.status || 'normal';
      const now = Date.now();
      const smallThumb = captureThumbnail(tile.video, 320, 240);
      const event = {
        id: 'ai_' + now + '_' + Math.random().toString(36).slice(2, 6),
        time: now, peerId,
        class: 'ai-review',
        label: status === 'risco' ? 'IA: risco' : status === 'atencao' ? 'IA: atenção' : 'IA: normal',
        score: 1, thumb: smallThumb, videoUrl: null,
        aiAnalysis: parsed,
      };
      detection.events.unshift(event);
      if (detection.events.length > 50) detection.events = detection.events.slice(0, 50);
      storage('vigilia:events', detection.events);
      updateLogBadge();
      if (document.getElementById('modal-body')) renderLogItems();
      if (status === 'risco' && detection.alertsEnabled) playAlert();
    } catch (err) { console.warn('periodic ai fail:', err); }
  }
}

  const call = state.peer.call(peerId, createEmptyStream());

  tile.call = call;
  const timeout = setTimeout(() => { if (!tile.gotStream) tile.setState('sem resposta — verifique o ID'); }, 15000);
  call.on('stream', (rs) => {
    clearTimeout(timeout); tile.gotStream = true; tile.video.srcObject = rs; tile.setLive();
    if (window.MediaRecorder) {
      try { tile.recorder = new ClipRecorder(rs); tile.recorder.start(); }
      catch (e) { console.warn('recorder start fail:', e); }

    startDetectionLoop(tile);
  });
  call.on('close', () => tile.setState('câmera desconectada'));
  call.on('error', () => tile.setState('erro de conexão'));
}

function createTile(peerId) {
  const wrapper = document.createElement('div');
  wrapper.className = 'tile';
  const video = document.createElement('video');
  video.autoplay = true; video.muted = true; video.playsInline = true;
  wrapper.appendChild(video);

  const debugCanvas = document.createElement('canvas');
  debugCanvas.className = 'debug-overlay';
  debugCanvas.width = 160; debugCanvas.height = 120;
  wrapper.appendChild(debugCanvas);

  const canvas = document.createElement('canvas');
  canvas.className = 'detect-overlay';
  wrapper.appendChild(canvas);

  const emptyMsg = document.createElement('div');
  emptyMsg.className = 'tile-empty-msg';
  emptyMsg.textContent = 'conectando…';
  wrapper.appendChild(emptyMsg);

  const debugInfo = document.createElement('div');
  debugInfo.className = 'tile-debug-info';
  wrapper.appendChild(debugInfo);

  const header = document.createElement('div');
  header.className = 'tile-header';
  header.innerHTML = `
    <div style="display:flex; align-items:center; gap:0.5rem;">
      <span class="tile-id"></span>
      <span class="tile-detect-badge"></span>
    </div>
    <button class="tile-remove" title="Remover">✕</button>`;
  header.querySelector('.tile-id').textContent = peerId;
  wrapper.appendChild(header);

  const footer = document.createElement('div');
  footer.className = 'tile-footer';
  footer.innerHTML = `<span class="tile-live">AO VIVO</span><span class="tile-time">--:--:--</span>`;
  wrapper.appendChild(footer);

  const timeEl = footer.querySelector('.tile-time');
  const liveEl = footer.querySelector('.tile-live');
  const badgeEl = header.querySelector('.tile-detect-badge');
  const removeBtn = header.querySelector('.tile-remove');

  const timeInt = setInterval(() => { timeEl.textContent = fmtTime(); }, 1000);
  timeEl.textContent = fmtTime();

  video.addEventListener('loadedmetadata', () => {
    if (video.videoWidth && video.videoHeight) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    }
  });

  const tile = {
    peerId, wrapper, video, canvas, debugCanvas, debugInfo,
    gotStream: false, call: null,
    detectionTimeout: null, fallDetector: null,
    setLive() { emptyMsg.style.display = 'none'; liveEl.classList.add('active'); },
    setState(msg) { liveEl.classList.remove('active'); emptyMsg.textContent = msg; emptyMsg.style.display = 'flex'; },
    applyDebugMode() {
      const show = detection.debugMode && detection.workMode === 'shipping';
      debugCanvas.classList.toggle('on', show);
      debugInfo.classList.toggle('on', show);
      if (!show) {
        const ctx = debugCanvas.getContext('2d');
        ctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
        debugInfo.textContent = '';
      }
    },
    updateDetections(cocoPreds, fallResult) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (detection.workMode === 'residential') {
        cocoPreds.forEach(p => {
          if (!detection.targetClasses.has(p.class)) return;
          drawBox(ctx, canvas, p.bbox, CLASS_LABELS_PT[p.class] || p.class, p.score, detection.alertClasses.has(p.class));
        });
        const relevant = cocoPreds.filter(p => detection.targetClasses.has(p.class));
        updateBadge(badgeEl, relevant.map(p => ({ label: CLASS_LABELS_PT[p.class] || p.class, alert: detection.alertClasses.has(p.class) })));
        const alertHits = relevant.filter(p => detection.alertClasses.has(p.class));
        if (alertHits.length > 0) triggerAlert(tile, { class: alertHits[0].class, label: CLASS_LABELS_PT[alertHits[0].class] || alertHits[0].class, score: alertHits[0].score });
      } else {
        // shipping mode
        if (fallResult?.fall) {
          drawFallMarker(ctx, canvas, fallResult.fall.bbox);
          updateBadge(badgeEl, [{ label: 'QUEDA', alert: true }]);
          triggerAlert(tile, { class: 'fall', label: 'queda detectada', score: fallResult.fall.confidence });
          flashTile(wrapper);
        } else {
          updateBadge(badgeEl, []);
        }
      }
    },
    clearDetections() {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      badgeEl.classList.remove('active', 'alert');
      badgeEl.textContent = '';
      const dctx = debugCanvas.getContext('2d');
      dctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
      debugInfo.textContent = '';
    },
    destroy() {
      clearInterval(timeInt); clearTimeout(tile.detectionTimeout);
      try { tile.recorder && tile.recorder.stop(); } catch {}
      try { tile.call && tile.call.close(); } catch {}
      try { tile.video.srcObject?.getTracks().forEach(t => t.stop()); } catch {}
      wrapper.remove();
    }
  };

  removeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    state.cameras.delete(peerId); persistCameras();
    tile.destroy();
    if (state.cameras.size === 0) renderGridEmpty();
  });
  wrapper.addEventListener('dblclick', () => {
    if (document.fullscreenElement === wrapper) document.exitFullscreen();
    else wrapper.requestFullscreen?.().catch(() => {});
  });

  tile.applyDebugMode();
  return tile;
}

// ============ CLIP RECORDER ============
class ClipRecorder {
  constructor(stream) { this.stream = stream; this.rec = null; this.chunks = []; this.capturePending = false; this.cycleTimer = null; }
  start() {
    if (!this.stream || !window.MediaRecorder) return;
    try { this._newCycle(); } catch (e) { console.warn('ClipRecorder start:', e); return; }
    this.cycleTimer = setInterval(() => { if (!this.capturePending) this._newCycle(); }, CLIP_PRE_MS);
  }
  _newCycle() {
    if (this.rec && this.rec.state !== 'inactive') {
      this.rec.ondataavailable = null; this.rec.onstop = null;
      try { this.rec.stop(); } catch {}
    }
    this.chunks = [];
    const opts = { videoBitsPerSecond: CLIP_BITRATE };
    if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) opts.mimeType = 'video/webm;codecs=vp8';
    else if (MediaRecorder.isTypeSupported('video/webm')) opts.mimeType = 'video/webm';
    this.rec = new MediaRecorder(this.stream, opts);
    this.rec.ondataavailable = (e) => { if (e.data.size > 0) this.chunks.push(e.data); };
    this.rec.start(500);
  }
  async captureClip() {
    if (!this.rec || this.capturePending) return null;
    this.capturePending = true;
    await new Promise(r => setTimeout(r, CLIP_POST_MS));
    return new Promise(resolve => {
      const chunks = this.chunks;
      const mimeType = this.rec.mimeType || 'video/webm';
      this.rec.onstop = () => {
        const blob = chunks.length > 0 ? new Blob(chunks, { type: mimeType }) : null;
        this.capturePending = false; this._newCycle();
        resolve(blob);
      };
      try { this.rec.stop(); }
      catch { this.capturePending = false; resolve(null); }
    });
  }
  stop() {
    if (this.cycleTimer) { clearInterval(this.cycleTimer); this.cycleTimer = null; }
    if (this.rec && this.rec.state !== 'inactive') { try { this.rec.stop(); } catch {} }
    this.rec = null; this.chunks = [];
  }
}

async function uploadClip(filename, blob) {
  try {
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/recordings/${filename}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Content-Type': blob.type || 'video/webm', 'x-upsert': 'true' },
      body: blob
    });
    if (!res.ok) { console.warn('Upload falhou:', res.status, await res.text()); return null; }
    return `${SUPABASE_URL}/storage/v1/object/public/recordings/${filename}`;
  } catch (err) { console.warn('Upload erro:', err); return null; }
}

async function cleanupOldRecordings() {
  try {
    const listRes = await fetch(`${SUPABASE_URL}/storage/v1/object/list/recordings`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ prefix: '', limit: 100, offset: 0 })
    });
    if (!listRes.ok) return;
    const files = await listRes.json();
    if (!Array.isArray(files)) return;
    const now = Date.now();
    const toDelete = files.filter(f => f.created_at && (now - new Date(f.created_at).getTime()) > CLIP_MAX_AGE_MS).map(f => f.name);
    if (toDelete.length === 0) return;
    await fetch(`${SUPABASE_URL}/storage/v1/object/recordings`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ prefixes: toDelete })
    });
    console.log('Vigilia: limpou', toDelete.length, 'clip(s) antigos');
  } catch (err) { console.warn('Cleanup err:', err); }
}

async function analyzeWithGemini(dataUrl, promptText) {
  try {
    if (!dataUrl || !dataUrl.startsWith('data:')) return null;
    const base64 = dataUrl.split(',')[1];
    const mime = dataUrl.match(/^data:([^;]+);/)?.[1] || 'image/jpeg';
    const res = await fetch('/api/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: promptText, image: base64, mime, model: GEMINI_MODEL })
    });
    if (!res.ok) { console.warn('Gemini proxy', res.status, await res.text()); return null; }
    const data = await res.json();
    return data.text || null;
  } catch (err) { console.warn('Gemini erro:', err); return null; }
}

function parseGeminiJson(text) {
  if (!text) return null;
  try {
    const cleaned = text.replace(/```json/gi, '').replace(/```/g, '').trim();
    const start = cleaned.indexOf('{');
    const end = cleaned.lastIndexOf('}');
    if (start < 0 || end < 0) return null;
    return JSON.parse(cleaned.slice(start, end + 1));
  } catch { return null; }
}

const GEMINI_PROMPT_CONFIRM = `Voce analisa um frame de camera de vigilancia. Detector automatico sinalizou: "{LABEL}". Sua resposta deve ser APENAS um objeto JSON valido em portugues brasileiro, sem raciocinio, sem markdown, sem texto antes ou depois. Formato exato: {"confirmed":true,"description":"texto curto em pt-BR de no maximo 15 palavras","urgency":"baixa"} onde confirmed e true ou false, urgency e baixa|media|alta. Responda o JSON agora.`;

const GEMINI_PROMPT_PERIODIC = `Voce analisa um frame de camera de vigilancia. Sua resposta deve ser APENAS um objeto JSON valido em portugues brasileiro, sem raciocinio, sem markdown, sem texto antes ou depois. Formato exato: {"status":"normal","description":"texto em pt-BR de no maximo 20 palavras","concerns":[]} onde status e normal|atencao|risco, concerns e array de strings (vazio se tudo normal). Responda o JSON agora.`;


// ============ FALL DETECTOR (v4 — centroide global) ============
class FallDetector {
  constructor() {
    this.workW = 160; this.workH = 120;
    this.canvas = document.createElement('canvas');
    this.canvas.width = this.workW; this.canvas.height = this.workH;
    this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
    this.prevGray = null;
    this.history = []; // {t, N, avgY, maxY, minX, maxX, minY}
    this.motionMask = null; // Uint8Array for debug drawing
  }
  reset() { this.prevGray = null; this.history = []; this.motionMask = null; }

  analyze(video, personBoxes /* normalized {x,y,w,h} */) {
    if (!video.videoWidth || video.readyState < 2) return { motion: null, fall: null, stats: null };

    const w = this.workW, h = this.workH;
    this.ctx.drawImage(video, 0, 0, w, h);
    const img = this.ctx.getImageData(0, 0, w, h).data;
    const gray = new Uint8ClampedArray(w * h);
    for (let i = 0, j = 0; i < img.length; i += 4, j++) {
      gray[j] = (img[i] * 0.299 + img[i+1] * 0.587 + img[i+2] * 0.114) | 0;
    }

    if (!this.prevGray) { this.prevGray = gray; return { motion: null, fall: null, stats: { N: 0 } }; }

    const p = SENS_PROFILES[detection.sensitivity];

    // mask de pessoas (áreas onde ignoramos movimento)
    const personMask = new Uint8Array(w * h);
    for (const box of personBoxes) {
      const ex = 0.2; // 20% margin
      const x0 = Math.max(0, Math.floor((box.x - box.w*ex) * w));
      const y0 = Math.max(0, Math.floor((box.y - box.h*ex) * h));
      const x1 = Math.min(w, Math.ceil((box.x + box.w*(1+ex)) * w));
      const y1 = Math.min(h, Math.ceil((box.y + box.h*(1+ex)) * h));
      for (let y = y0; y < y1; y++)
        for (let x = x0; x < x1; x++)
          personMask[y * w + x] = 1;
    }

    // frame diff -> motion mask + stats
    const motion = new Uint8Array(w * h);
    let N = 0, sumX = 0, sumY = 0;
    let minX = w, maxX = 0, minY = h, maxY = 0;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        if (personMask[i]) continue;
        const d = Math.abs(gray[i] - this.prevGray[i]);
        if (d > p.motionThreshold) {
          motion[i] = 1;
          N++; sumX += x; sumY += y;
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
      }
    }
    this.prevGray = gray;
    this.motionMask = motion;

    const now = performance.now();
    let motionInfo = null;
    if (N >= p.minPixels) {
      motionInfo = {
        t: now,
        N,
        avgX: (sumX / N) / w,
        avgY: (sumY / N) / h,
        minX: minX / w, maxX: maxX / w,
        minY: minY / h, maxY: maxY / h,
      };
      this.history.push(motionInfo);
    }
    // trim history a 1s
    while (this.history.length && now - this.history[0].t > 1000) this.history.shift();

    // detectar queda: nos últimos p.minFrames samples,
    //  - avgY tem que ter subido (mais pra baixo — y cresce descendo)
    //  - maxY tem que ter subido (extremo inferior descendo)
    //  - variação total avgY >= p.minDropRatio
    //  - variação deve ser predominantemente crescente
    let fall = null;
    if (this.history.length >= p.minFrames) {
      const recent = this.history.slice(-Math.max(p.minFrames, 5));
      const first = recent[0];
      const last = recent[recent.length - 1];
      const dropAvg = last.avgY - first.avgY;
      const dropMax = last.maxY - first.maxY;
      // fração de intervalos com dy positivo
      let downSteps = 0;
      for (let i = 1; i < recent.length; i++) {
        if (recent[i].avgY > recent[i-1].avgY - 0.01) downSteps++;
      }
      const downRatio = downSteps / (recent.length - 1);
      const durationMs = last.t - first.t;
      if (dropAvg >= p.minDropRatio
          && dropMax >= p.minDropRatio * 0.7
          && downRatio >= 0.6
          && durationMs >= 150 && durationMs <= 1500) {
        // confidence baseado em dropAvg
        const conf = Math.min(1, dropAvg / 0.4);
        // bbox aproximado do movimento no último frame
        fall = {
          bbox: { x: last.minX, y: last.minY, w: last.maxX - last.minX, h: last.maxY - last.minY },
          confidence: conf,
          dropAvg, dropMax, downRatio, durationMs,
        };
        // limpa histórico pra não alertar em sequência
        this.history = [];
      }
    }

    return { motion: motionInfo, fall, stats: { N, dropAvg: motionInfo ? this.calcRecentDrop() : 0 } };
  }
  calcRecentDrop() {
    if (this.history.length < 2) return 0;
    return this.history[this.history.length-1].avgY - this.history[0].avgY;
  }
  paintDebug(destCanvas, motionMask, personBoxes, motionInfo) {
    const dctx = destCanvas.getContext('2d');
    const w = this.workW, h = this.workH;
    if (destCanvas.width !== w || destCanvas.height !== h) { destCanvas.width = w; destCanvas.height = h; }
    const imgData = dctx.createImageData(w, h);
    for (let i = 0, j = 0; i < motionMask.length; i++, j += 4) {
      if (motionMask[i]) {
        imgData.data[j] = 220; imgData.data[j+1] = 40; imgData.data[j+2] = 40; imgData.data[j+3] = 200;
      } else {
        imgData.data[j+3] = 0;
      }
    }
    dctx.putImageData(imgData, 0, 0);
    // desenha centroide
    if (motionInfo) {
      dctx.fillStyle = '#e8b84c';
      dctx.fillRect(motionInfo.avgX * w - 2, motionInfo.avgY * h - 2, 4, 4);
    }
    // desenha máscaras de pessoa
    dctx.strokeStyle = '#6ec2e8';
    dctx.lineWidth = 1;
    for (const box of personBoxes) {
      dctx.strokeRect(box.x * w, box.y * h, box.w * w, box.h * h);
    }
  }
}

// ============ Orquestração ============
async function initDetector() {
  if (detection.detector || detection.loading) return;
  detection.loading = true;
  setDetectStatus('Carregando modelo de detecção (~4MB)…', 'loading');
  try {
    if (tf.setBackend) await tf.setBackend('webgl');
    detection.detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    setDetectStatus(detection.workMode === 'shipping'
      ? 'Modo transportadora ativo — detectando quedas.'
      : 'Modo residencial ativo — pessoa/cachorro/gato.', 'ready');
  } catch (err) {
    console.error(err);
    setDetectStatus('Falha ao carregar detector: ' + err.message, 'error');
    detection.enabled = false; updateDetectionButtons();
  } finally { detection.loading = false; }
}
function setDetectStatus(msg, kind) {
  const el = document.getElementById('detect-status'); if (!el) return;
  el.textContent = msg; el.className = 'detect-status ' + (kind || '');
}
function toggleDetection() {
  detection.enabled = !detection.enabled;
  storage('vigilia:detect-on', detection.enabled);
  updateDetectionButtons();
  if (detection.enabled && !detection.audioCtx) {
    try { detection.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  if (detection.enabled) {
    initDetector();
    state.cameras.forEach(tile => { if (tile.gotStream) startDetectionLoop(tile); });
  } else {
    setDetectStatus('', 'off');
    state.cameras.forEach(tile => tile.clearDetections());
  }
}
function toggleAlerts() {
  detection.alertsEnabled = !detection.alertsEnabled;
  storage('vigilia:alerts-on', detection.alertsEnabled);
  updateDetectionButtons();
}
function updateDetectionButtons() {
  const d = document.getElementById('toggle-detect');
  const a = document.getElementById('toggle-alerts');
  const g = document.getElementById('toggle-debug');
  if (d) { d.textContent = detection.enabled ? 'Detecção ON' : 'Detecção OFF'; d.classList.toggle('btn-toggle-on', detection.enabled); }
  if (a) { a.textContent = detection.alertsEnabled ? 'Som ON' : 'Som OFF'; a.classList.toggle('btn-toggle-on', detection.alertsEnabled); }
  if (g) { g.textContent = detection.debugMode ? 'Debug ON' : 'Debug OFF'; g.classList.toggle('btn-toggle-on', detection.debugMode); }
}

function startDetectionLoop(tile) {
  if (tile.detectionTimeout) clearTimeout(tile.detectionTimeout);

  let cocoCounter = 0;
  let lastCocoPreds = [];

  const tick = async () => {
    if (!state.cameras.has(tile.peerId)) return;
    try {
      if (detection.enabled && detection.detector && tile.video.readyState >= 2) {
        // roda COCO só a cada 5 ticks (500ms) em shipping (pesado); todo tick em residencial
        if (detection.workMode === 'shipping') {
          if (cocoCounter % 5 === 0) {
            lastCocoPreds = await detection.detector.detect(tile.video, 15, 0.3);
            lastCocoPreds = lastCocoPreds.filter(p => p.score >= (CLASS_MIN_SCORE[p.class] || 0.5));
          }
          cocoCounter++;

          if (!tile.fallDetector) tile.fallDetector = new FallDetector();
          const persons = lastCocoPreds.filter(p => p.class === 'person').map(p => ({
            x: p.bbox[0] / tile.video.videoWidth,
            y: p.bbox[1] / tile.video.videoHeight,
            w: p.bbox[2] / tile.video.videoWidth,
            h: p.bbox[3] / tile.video.videoHeight,
          }));
          const result = tile.fallDetector.analyze(tile.video, persons);
          tile.updateDetections(lastCocoPreds, result);

          // debug overlay
          if (detection.debugMode && tile.fallDetector.motionMask) {
            tile.fallDetector.paintDebug(tile.debugCanvas, tile.fallDetector.motionMask, persons, result.motion);
            tile.debugInfo.innerHTML = `pixels em mov: ${result.stats.N}<br>queda acumul: ${(result.stats.dropAvg * 100).toFixed(1)}%<br>histórico: ${tile.fallDetector.history.length} frames`;
          }
        } else {
          let preds = await detection.detector.detect(tile.video, 15, 0.3);
          preds = preds.filter(p => p.score >= (CLASS_MIN_SCORE[p.class] || 0.5));
          tile.updateDetections(preds, null);
        }
      }
    } catch (err) { console.warn('loop err', err); }
    const interval = detection.workMode === 'shipping' ? 100 : 800; // 10fps para shipping
    tile.detectionTimeout = setTimeout(tick, interval);
  };
  tick();
}

// ============ Drawing helpers ============
function drawBox(ctx, canvas, bbox, label, score, isAlert) {
  const [x, y, w, h] = bbox;
  const color = isAlert ? '#d4614a' : '#6ec2e8';
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(2, canvas.width / 400);
  ctx.strokeRect(x, y, w, h);
  const text = label + ' ' + Math.round(score * 100) + '%';
  const fs = Math.max(12, canvas.width / 50);
  ctx.font = `600 ${fs}px 'JetBrains Mono', monospace`;
  const m = ctx.measureText(text);
  const padH = fs * 0.4, padV = fs * 0.25;
  const lh = fs + padV * 2;
  ctx.fillStyle = color; ctx.fillRect(x, y - lh, m.width + padH * 2, lh);
  ctx.fillStyle = '#0a0d0a'; ctx.fillText(text, x + padH, y - padV - 2);
}
function drawFallMarker(ctx, canvas, bbNorm) {
  const x = bbNorm.x * canvas.width;
  const y = bbNorm.y * canvas.height;
  const w = bbNorm.w * canvas.width;
  const h = bbNorm.h * canvas.height;
  ctx.strokeStyle = '#d4614a';
  ctx.lineWidth = Math.max(3, canvas.width / 250);
  ctx.setLineDash([canvas.width / 60, canvas.width / 120]);
  ctx.strokeRect(x, y, w, h);
  ctx.setLineDash([]);
  const label = '⚠ QUEDA';
  const fs = Math.max(14, canvas.width / 40);
  ctx.font = `700 ${fs}px 'JetBrains Mono', monospace`;
  const m = ctx.measureText(label);
  const padH = fs * 0.4, padV = fs * 0.25;
  const lh = fs + padV * 2;
  ctx.fillStyle = '#d4614a'; ctx.fillRect(x, Math.max(0, y - lh), m.width + padH * 2, lh);
  ctx.fillStyle = '#0a0d0a'; ctx.fillText(label, x + padH, Math.max(fs, y) - padV - 2);
}
function updateBadge(el, items) {
  if (items.length === 0) { el.classList.remove('active', 'alert'); el.textContent = ''; return; }
  const hasAlert = items.some(i => i.alert);
  el.classList.add('active'); el.classList.toggle('alert', hasAlert);
  el.textContent = '· ' + items.map(i => i.label).join(', ');
}
function flashTile(wrapper) {
  wrapper.classList.remove('alerting'); void wrapper.offsetWidth;
  wrapper.classList.add('alerting');
  setTimeout(() => wrapper.classList.remove('alerting'), 500);
}

// ============ Alerta ============
function triggerAlert(tile, prediction) {
  const now = Date.now();
  const last = detection.cooldowns.get(tile.peerId) || 0;
  const p = SENS_PROFILES[detection.sensitivity];
  const cooldown = detection.workMode === 'shipping' ? p.cooldownMs : 10000;
  if (now - last < cooldown) return;
  detection.cooldowns.set(tile.peerId, now);

  const thumb = captureThumbnail(tile.video, 320, 240);
  const eventId = 'ev_' + now + '_' + Math.random().toString(36).slice(2, 8);
  const event = {
    id: eventId, time: now, peerId: tile.peerId,
    class: prediction.class, label: prediction.label,
    score: prediction.score || 1,
    thumb, videoUrl: null,
  };
  detection.events.unshift(event);
  if (detection.events.length > 50) detection.events = detection.events.slice(0, 50);
  storage('vigilia:events', detection.events);
  updateLogBadge();
  if (detection.alertsEnabled) playAlert();

  (async () => {
    let parsed = null;
    try {
      const hiRes = captureThumbnail(tile.video, GEMINI_SNAPSHOT_W, GEMINI_SNAPSHOT_H);
      if (hiRes) {
        const prompt = GEMINI_PROMPT_CONFIRM.replace('{LABEL}', prediction.label);
        const text = await analyzeWithGemini(hiRes, prompt);
        if (text) parsed = parseGeminiJson(text) || { raw: text };
      }
    } catch (err) { console.warn('gemini alert fail:', err); }
    if (!parsed) parsed = { error: true, description: 'Análise indisponível (verifique console)' };
    const ev = detection.events.find(e => e.id === eventId);
    if (ev) { ev.aiAnalysis = parsed; storage('vigilia:events', detection.events);
      if (document.getElementById('modal-body')) renderLogItems();
    }
  })();

  if (tile.recorder) {
    (async () => {
      try {
        const blob = await tile.recorder.captureClip();
        if (!blob || blob.size < 1000) return;
        const filename = `${tile.peerId}-${now}.webm`;
        const url = await uploadClip(filename, blob);
        if (!url) return;
        const ev = detection.events.find(e => e.id === eventId);
        if (ev) { ev.videoUrl = url; storage('vigilia:events', detection.events);
          if (document.getElementById('modal-body')) renderLogItems();
        }
      } catch (err) { console.warn('clip fail:', err); }
    })();
  }
}
function captureThumbnail(video, w, h) {
  try {
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return null;
    const scale = Math.max(w / vw, h / vh);
    const sw = w / scale, sh = h / scale;
    const sx = (vw - sw) / 2, sy = (vh - sh) / 2;
    c.getContext('2d').drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
    return c.toDataURL('image/jpeg', 0.6);
  } catch { return null; }
}
function playAlert() {
  const ctx = detection.audioCtx; if (!ctx) return;
  try {
    const now = ctx.currentTime;
    [880, 660].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'square'; osc.frequency.value = freq;
      osc.connect(gain); gain.connect(ctx.destination);
      const s = now + i * 0.15;
      gain.gain.setValueAtTime(0.15, s);
      gain.gain.exponentialRampToValueAtTime(0.001, s + 0.12);
      osc.start(s); osc.stop(s + 0.13);
    });
  } catch {}
}
function updateLogBadge() {
  const b = document.getElementById('log-badge'); if (!b) return;
  const n = detection.events.length;
  if (n > 0) { b.textContent = n > 99 ? '99+' : String(n); b.style.display = 'inline-block'; }
  else b.style.display = 'none';
}
function showLog() {
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <span>LOG DE DETECÇÕES</span>
        <div class="modal-header-actions">
          <button class="btn" id="reanalyze-all">Reanalisar</button>
          <button class="btn btn-danger" id="clear-log">Limpar</button>
          <button class="btn" id="close-log">Fechar</button>
        </div>
      </div>
      <div class="log-filters" id="log-filters"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>`;
  document.body.appendChild(bd);
  renderLogFilters();
  renderLogItems();
  document.getElementById('reanalyze-all').addEventListener('click', reanalyzeAllEvents);
  document.getElementById('close-log').addEventListener('click', () => bd.remove());
  document.getElementById('clear-log').addEventListener('click', () => {

    renderLogFilters(); renderLogItems();
  });
  bd.addEventListener('click', (e) => { if (e.target === bd) bd.remove(); });
}

async function reanalyzeAllEvents() {
  const pending = detection.events.filter(ev => ev.thumb);
  const btn = document.getElementById('reanalyze-all');
  if (pending.length === 0) {
    if (btn) { const t = btn.textContent; btn.textContent = 'Nada para reanalisar'; setTimeout(() => btn.textContent = t, 1500); }
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = `0/${pending.length}…`; }
  let ok = 0, fail = 0;
  for (let i = 0; i < pending.length; i++) {
    const ev = pending[i];
    try {
      const prompt = ev.class === 'ai-review'
        ? GEMINI_PROMPT_PERIODIC
        : GEMINI_PROMPT_CONFIRM.replace('{LABEL}', ev.label);
      const text = await analyzeWithGemini(ev.thumb, prompt);
      if (text) {
        ev.aiAnalysis = parseGeminiJson(text) || { raw: text };
        ok++;
        storage('vigilia:events', detection.events);
        renderLogItems();
      } else { fail++; }
    } catch (err) { console.warn('reanalyze fail:', err); fail++; }
    if (btn) btn.textContent = `${i+1}/${pending.length}…`;
    await new Promise(r => setTimeout(r, 800));
  }
  if (btn) { btn.disabled = false; btn.textContent = `${ok} ok, ${fail} falha`; setTimeout(() => btn.textContent = 'Reanalisar', 3000); }
}

function renderLogFilters() {
  const wrap = document.getElementById('log-filters');

  const filters = [
    { key: 'all',    label: 'Todos' },
    { key: 'fall',   label: 'Quedas' },
    { key: 'person', label: 'Pessoas' },
    { key: 'pet',    label: 'Pets' },
    { key: 'ai',     label: 'IA' },
  ];
  wrap.innerHTML = '';
  filters.forEach(f => {
    const count = detection.events.filter(LOG_FILTER_MATCH[f.key]).length;

    btn.innerHTML = `${f.label}<span class="log-filter-count">${count}</span>`;
    btn.addEventListener('click', () => {
      detection.logFilter = f.key;
      renderLogFilters();
      renderLogItems();
    });
    wrap.appendChild(btn);
  });
}
function renderLogItems() {

        ${ev.aiAnalysis
          ? `<div class="log-ai ${ev.aiAnalysis.urgency === 'alta' || ev.aiAnalysis.status === 'risco' ? 'risco' : (ev.aiAnalysis.urgency === 'media' || ev.aiAnalysis.status === 'atencao' ? 'atencao' : 'ok')}">🤖 ${(ev.aiAnalysis.description || ev.aiAnalysis.raw || '').slice(0, 200)}${ev.aiAnalysis.confirmed === false ? ' <em>(IA discorda)</em>' : ''}${Array.isArray(ev.aiAnalysis.concerns) && ev.aiAnalysis.concerns.length > 0 ? ' — ' + ev.aiAnalysis.concerns.join(', ') : ''}</div>`
          : (ev.class === 'ai-review' || ev.class === 'fall' || ev.class === 'person'
              ? '<div class="log-ai pending">🤖 analisando…</div>'
              : '')}
      </span>
      ${ev.thumb ? `<img class="log-thumb" src="${ev.thumb}" data-idx="${idx}" alt="snapshot">` : `<div class="log-thumb placeholder">sem img</div>`}`;
    body.appendChild(item);
  });
  body.querySelectorAll('.log-thumb[data-idx]').forEach(el => {
    el.addEventListener('click', () => { const ev = detection.events[Number(el.dataset.idx)]; if (ev?.thumb) showSnapshot(ev.thumb); });
  });
  body.querySelectorAll('.log-video-btn[data-url]').forEach(el => {
    el.addEventListener('click', () => showVideoModal(el.dataset.url));
  });
}
function showSnapshot(dataUrl) {
  const v = document.createElement('div');
  v.className = 'snapshot-viewer';
  v.innerHTML = `<img src="${dataUrl}" alt="snapshot ampliado">`;
  v.addEventListener('click', () => v.remove());
  document.body.appendChild(v);
}

function backToMenu() {
  try { state.peer && state.peer.destroy(); } catch {}
  if (state.localStream) state.localStream.getTracks().forEach(t => t.stop());
  if (state.clockInt) clearInterval(state.clockInt);
  state.cameras.forEach(t => t.destroy());
  state.cameras.clear(); state.activeCalls.clear();
  state.localStream = null; state.peer = null; state.myId = null;
  renderModeSelect();
}

renderModeSelect();
</script>
</body>
</html>
